name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check scripts/ tests/

      - name: Validate workflow YAML files parse
        run: |
          python - <<'PY'
          import sys, yaml, pathlib
          failed = False
          for p in pathlib.Path('.github/workflows').glob('*.yml'):
              try:
                  yaml.safe_load(p.read_text())
                  print(f'OK: {p}')
              except Exception as exc:
                  print(f'FAIL: {p}: {exc}')
                  failed = True
          sys.exit(1 if failed else 0)
          PY

      - name: Compile deployer
        run: python -m py_compile scripts/deploy_composer.py

      - name: Unit tests
        run: pytest -v

      - name: Dry-run smoke check
        env:
          GCP_PROJECT_ID: smoke-test
          GCP_REGION: us-central1
          COMPOSER_ENV_NAME: composer-smoke
          DRY_RUN: '1'
        run: python scripts/deploy_composer.py
