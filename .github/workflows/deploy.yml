name: deploy-composer

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref or tag to deploy
        required: false
        type: string
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy (defaults to main)
        required: false
        type: string
        default: main

concurrency:
  group: deploy-composer
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy Composer environment
        run: python scripts/deploy_composer.py
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ vars.GCP_REGION }}
          COMPOSER_ENV_NAME: ${{ vars.COMPOSER_ENV_NAME }}
          COMPOSER_IMAGE_VERSION: ${{ vars.COMPOSER_IMAGE_VERSION }}
          COMPOSER_ENV_SIZE: ${{ vars.COMPOSER_ENV_SIZE }}
          COMPOSER_SERVICE_ACCOUNT: ${{ secrets.COMPOSER_SERVICE_ACCOUNT }}
          COMPOSER_NETWORK: ${{ vars.COMPOSER_NETWORK }}
          COMPOSER_SUBNETWORK: ${{ vars.COMPOSER_SUBNETWORK }}
          RELEASE_TAG: ${{ inputs.ref || github.sha }}
